<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="선박 인보이스 자동화 시스템 - 커버페이지 자동 생성, 중복 지급 방지, 견적 vs 실적 분석, 결재 워크플로우">
  <title>Invoice AutoPilot - 선박 인보이스 자동화</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/print.css">

  <!-- SheetJS for Excel Export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
</head>
<body>
  
  <!-- Login Container -->
  <div id="loginContainer" class="login-wrapper">
    <div class="login-box glass-panel">
      <div class="login-header">
        <div class="logo">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <h2>인보이스 관리 시스템</h2>
        <p>환영합니다! 로그인하거나 업체 계정을 생성하세요.</p>
      </div>

      <div class="tabs" style="margin-bottom:20px;">
        <button class="tab-btn active" id="tabLogin" onclick="App.toggleLoginMode('login')">로그인</button>
        <button class="tab-btn" id="tabRegister" onclick="App.toggleLoginMode('register')">업체 등록</button>
      </div>

      <!-- Login Form -->
      <form id="formLogin" onsubmit="event.preventDefault(); App.handleLogin();">
        <div class="form-group">
          <label class="form-label">아이디</label>
          <input type="text" class="form-input" id="loginUsername" required>
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input type="password" class="form-input" id="loginPassword" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:10px;">로그인</button>
      </form>

      <!-- Register Form -->
      <form id="formRegister" style="display:none;" onsubmit="event.preventDefault(); App.handleRegister();">
        <div class="form-group">
          <label class="form-label">업체 선택 (검색)</label>
          <input type="text" class="form-input" id="regVendorSearch" list="vendorsDatalist" placeholder="업체명을 입력하세요" required>
          <datalist id="vendorsDatalist"></datalist>
        </div>
        <div class="form-group">
          <label class="form-label">신규 아이디</label>
          <input type="text" class="form-input" id="regUsername" required>
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input type="password" class="form-input" id="regPassword" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:10px;">가입 및 로그인</button>
      </form>

      <div class="demo-accounts" style="margin-top: 25px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 0.85rem; color: var(--text-muted);">
        <strong>[테스트 계정]</strong><br>
        감독관: super1 / 1<br>
        팀장: team1 / 1<br>
        업체(해양테크): vendor1 / 1 (또는 업체 등록 탭에서 직접 다른 업체 생성 테스트)
      </div>
    </div>
  </div>

  <div id="appContainer" class="app-layout" style="display:none;">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-icon">📋</div>
          <div>
            <div class="logo-text">Invoice AutoPilot</div>
            <div class="logo-sub">선박 인보이스 자동화</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <nav class="nav-menu">
        <button class="nav-item active" data-page="dashboard" onclick="App.navigateTo('dashboard')" id="navDashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          <span data-i18n="대시보드|Dashboard">Dashboard</span>
        </button>
        <button class="nav-item" data-page="register" onclick="App.navigateTo('register')" id="navRegister">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
          <span data-i18n="인보이스 등록|Register Invoice">Register Invoice</span>
        </button>
        <button class="nav-item" data-page="list" onclick="App.navigateTo('list')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
          <span>진행상황 검색 (Invoice Search)</span>
        </button>
        <button class="nav-item" data-page="advance" onclick="App.navigateTo('advance')" id="navAdvance">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <span data-i18n="선급금 청구|Advance Payment">Advance Payment</span>
        </button>
        <button class="nav-item" data-page="settings" onclick="App.navigateTo('settings')" id="navSettings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          <span data-i18n="환경설정|Settings">Settings</span>
        </button>
      </nav>
      
      <!-- Notification Bell -->
      <div style="padding: 10px 14px; border-top: 1px solid var(--border-primary);">
        <div class="notif-bell-wrapper" onclick="NotificationCenter.togglePanel()" title="알림 센터">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-badge" id="notifBadge" style="display:none">0</span>
        </div>
      </div>

      <div class="user-profile" style="margin-top:auto; padding: 20px; border-top: 1px solid var(--border-primary);">
        <div style="display:flex; align-items:center; gap:10px;">
          <div style="width:36px; height:36px; border-radius:50%; background:var(--gradient-blue); display:flex; align-items:center; justify-content:center; color:white; font-weight:bold" id="userAvatar">U</div>
          <div style="flex:1;">
            <div style="font-weight:600; font-size:0.9rem" id="userNameLabel">User</div>
            <div style="font-size:0.8rem; color:var(--text-muted)" id="userRoleLabel">Role</div>
          </div>
          <button class="btn btn-secondary" style="padding:5px 10px; font-size:0.8rem" onclick="Auth.logout()">로그아웃</button>
        </div>
      </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content" id="mainContent">
      <div id="dashboard" class="page active"></div>
      <div id="register" class="page"></div>
      <div id="list" class="page"></div>
      <div id="advance" class="page"></div>
      <div id="approval" class="page"></div>
      <div id="analysis" class="page"></div>
      <div id="master" class="page"></div>
      <div id="settings" class="page"></div>
    </main>

  </div>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)App.closeModal()">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2>Modal Title</h2>
        <button class="modal-close" onclick="App.closeModal()">✕</button>
      </div>
      <div class="modal-body"></div>
      <div class="modal-footer"></div>
    </div>
  </div>

  <!-- ===== NOTIFICATION PANEL (Slide-out) ===== -->
  <div class="notif-panel" id="notifPanel">
    <div class="notif-panel-header">
      <h3>🔔 알림 센터 (Notifications)</h3>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="NotificationCenter.markAllRead()">모두 읽음</button>
        <button class="btn btn-ghost btn-sm" onclick="NotificationCenter.togglePanel()">✕</button>
      </div>
    </div>
    <div class="notif-panel-body" id="notifPanelBody"></div>
  </div>

  <!-- ===== TOAST NOTIFICATIONS ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ===== MOBILE TOGGLE ===== -->
  <button class="mobile-toggle" id="mobileToggle">☰</button>

  <!-- ===== SCRIPTS (load order matters) ===== -->
  <script src="js/storage.js"></script>
  <script src="js/ocrService.js"></script>
  <script src="js/coverGenerator.js"></script>
  <script src="js/notificationCenter.js"></script>
  <script src="js/approvalWorkflow.js"></script>
  <script src="js/invoiceManager.js"></script>
  <script src="js/analysisEngine.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/advanceManager.js"></script>
  <script src="js/excelExporter.js"></script>
  <script src="js/pdfService.js"></script>
  <script src="js/settingsManager.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
